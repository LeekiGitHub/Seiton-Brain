# Consumer-Modus (E20-1): Always-on-Restart-Policies fuer die Heim-Box.
# Wird vom Installer genutzt:
#   docker compose -f docker-compose.yml -f docker-compose.consumer.yml --profile polling up -d
services:
  db:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  api:
    restart: unless-stopped
  worker:
    restart: unless-stopped
  poller:
    restart: unless-stopped
