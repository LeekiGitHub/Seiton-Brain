name: Feature / Story
description: Neues Verhalten oder Verbesserungsvorschlag
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Größere Features sollten zur [`ROADMAP.md`](../../ROADMAP.md) passen.
        Bestehende Stories bitte referenzieren (z. B. `E12-3`).

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Welches Problem soll gelöst werden? Für wen?
      placeholder: "Als Self-Hoster möchte ich …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
      description: Optional — wie könnte es umgesetzt werden?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen
      description: Was hast du schon erwogen?
    validations:
      required: false

  - type: dropdown
    id: phase
    attributes:
      label: Ungefähre Phase (ROADMAP)
      options:
        - Unklar
        - Phase D — Public Readiness / Doku
        - Phase E — Ökosystem / Integrationen
        - Phase F — Retrieval / Q&A
        - Phase G — Produktisierung
        - Nur Idee / Backlog
    validations:
      required: false
