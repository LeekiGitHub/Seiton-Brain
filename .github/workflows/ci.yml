name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests

      - name: Pytest
        run: pytest

      - name: MCP client tests
        run: |
          pip install -r examples/mcp/seiton-brain-mcp/requirements.txt
          pytest examples/mcp/seiton-brain-mcp/tests
