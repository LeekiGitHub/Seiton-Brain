services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: seitonbrain
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d seitonbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data: