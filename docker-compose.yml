services:
  db:
    # pgvector-Variante des offiziellen Postgres-Images — bringt die
    # ``vector``-Extension fuer semantische Suche mit (E17-2). API-kompatibel
    # zu postgres:16, gleiche Daten/Volumes.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: seitonbrain
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d seitonbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
      REDIS_URL: redis://redis:6379/0
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Long-Polling-Alternative zum Webhook (E1-5). Nur mit Profil aktiv:
  #   docker compose --profile polling up
  # Consumer (E20-1): docker compose -f docker-compose.yml -f docker-compose.consumer.yml --profile polling up -d
  # VPS (E20-2): docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
  # Oder: ./scripts/install.sh bzw. ./scripts/deploy-vps.sh
  # Webhook (api) und Poller schliessen sich aus — der Poller ruft beim
  # Start deleteWebhook auf. Braucht keine oeffentliche URL.
  poller:
    build: .
    command: python -m app.telegram.polling
    profiles: ["polling"]
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
      REDIS_URL: redis://redis:6379/0
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
      REDIS_URL: redis://redis:6379/0
      # Persistenter Voice-Cache fuer Celery-Retry nach Crash (E6-2)
      TELEGRAM_VOICE_CACHE_DIR: /data/voice-cache
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
      - seiton-voice-cache:/data/voice-cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  seiton-voice-cache:
