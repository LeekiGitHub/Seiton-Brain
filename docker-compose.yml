services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: seitonbrain
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d seitonbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
      REDIS_URL: redis://redis:6379/0
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULT_PATH: /vault
      REDIS_URL: redis://redis:6379/0
    volumes:
      - "${OBSIDIAN_VAULT_HOST_PATH}:/vault"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
